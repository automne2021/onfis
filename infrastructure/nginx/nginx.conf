events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    upstream api_gateway {
        server api-gateway:8080;
    }

    server {
        listen 80;
        server_name onfis.me www.onfis.me;

        client_max_body_size 50M;

        # --- API routes (tenant-prefixed) ---
        location ~ ^/[^/]+/api/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- WebSocket routes (tenant-prefixed) ---
        location ~ ^/[^/]+/ws/ {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # --- Main Webapp static assets (built with base: '/_app/') ---
        location ^~ /_app/ {
            alias /usr/share/nginx/html/webapp/;
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # --- Landing Page static assets ---
        location ^~ /assets/ {
            root /usr/share/nginx/html/landing;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # --- Tenant routes → Main Webapp SPA ---
        # Any path like /{tenant}/dashboard, /{tenant}/auth/login, etc.
        location ~ ^/[^/]+/ {
            root /usr/share/nginx/html/webapp;
            try_files $uri @webapp_spa;
        }

        # Named fallback: luôn trả về webapp's index.html (không qua location matching lại)
        location @webapp_spa {
            root /usr/share/nginx/html/webapp;
            try_files /index.html =404;
        }

        # --- Root → Landing Page ---
        location / {
            root /usr/share/nginx/html/landing;
            try_files $uri $uri/ /index.html;
        }
    }
}
