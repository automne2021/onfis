services:
  # API Gateway
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: onfis-api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      USER_SERVICE_URL: http://user-service:8081
      PROJECT_SERVICE_URL: http://project-service:8082
      POSITION_SERVICE_URL: http://position-service:8083
      ADMIN_SERVICE_URL: http://admin-service:8084
      CHAT_SERVICE_URL: http://chat-service:8085
      ANNOUNCEMENT_SERVICE_URL: http://announcement-service:8086
    networks:
      - onfis-network

  # User Service
  user-service:
    build:
      context: ./backend
      dockerfile: services/user-service/Dockerfile
    container_name: onfis-user-service
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
    networks:
      - onfis-network

  # Project Service
  project-service:
    build:
      context: ./backend
      dockerfile: services/project-service/Dockerfile
    container_name: onfis-project-service
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
    networks:
      - onfis-network

  # Position Service
  position-service:
    build:
      context: ./backend
      dockerfile: services/position-service/Dockerfile
    container_name: onfis-position-service
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
    networks:
      - onfis-network

  # Admin Service
  admin-service:
    build:
      context: ./backend
      dockerfile: services/admin-service/Dockerfile
    container_name: onfis-admin-service
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
    networks:
      - onfis-network

  # Chat Service
  chat-service:
    build:
      context: ./backend
      dockerfile: services/chat-service/Dockerfile
    container_name: onfis-chat-service
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m
    networks:
      - onfis-network
    depends_on:
      - redis

  # Announcement Service
  announcement-service:
    build:
      context: ./backend
      dockerfile: services/announcement-service/Dockerfile
    container_name: onfis-announcement-service
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
    networks:
      - onfis-network

  # Nginx Reverse Proxy + Frontend Static Files
  nginx:
    build:
      context: .
      dockerfile: infrastructure/nginx/Dockerfile
    container_name: onfis-nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - onfis-network
    depends_on:
      - api-gateway
      - user-service
      - project-service
      - position-service
      - admin-service
      - chat-service
      - announcement-service
      - redis
  redis:
    image: redis:7-alpine
    container_name: onfis-redis
    ports:
      - "6379:6379"
    networks:
      - onfis-network
    command: redis-server --appendonly yes

networks:
  onfis-network:
    driver: bridge

volumes: {}
