server:
  port: 8085
spring:
  application:
    name: chat-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?prepareThreshold=0
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost} 
      port: ${REDIS_PORT:6379}
logging:
  level:
    com.onfis: DEBUG
app:
  jwt:
    secret: ${JWT_SECRET}
    services:
      user: ${USER_SERVICE_URL:http://onfis-user-service:8081}
livekit:
  api-key: ${LIVEKIT_API_KEY}
  api-secret: ${LIVEKIT_API_SECRET}
  url: ${LIVEKIT_URL}
