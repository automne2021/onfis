server:
  port: 8086
spring:
  application:
    name: announcement-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?prepareThreshold=0
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
logging:
  level:
    com.onfis: DEBUG
app:
  services:
    user: ${USER_SERVICE_URL:http://onfis-user-service:8081}
    position: ${POSITION_SERVICE_URL:http://onfis-position-service:8083}
supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_SERVICE_ROLE_KEY}
  bucket:
    name: "onfis"