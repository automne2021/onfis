server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: 
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:5173"
              - "https://onfis.me"
              - "http://onfis.me"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
      routes:
        # User Service Routes
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/{tenant}/api/users/**,/{tenant}/api/auth/**
          filters:
            - RewritePath=/(?<tenant>[^/]+)/api/(?<segment>.*), /${segment}

        # Project Service Routes
        - id: project-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/{tenant}/api/projects/**
          filters:
            - RewritePath=/(?<tenant>[^/]+)/api/(?<segment>.*), /${segment}

        # Position Service Routes
        - id: position-service
          uri: ${POSITION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/{tenant}/api/positions/**
          filters:
            - RewritePath=/(?<tenant>[^/]+)/api/(?<segment>.*), /${segment}

        # Admin Service Routes
        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/{tenant}/api/admin/**
          filters:
            - RewritePath=/(?<tenant>[^/]+)/api/(?<segment>.*), /${segment}

        # Chat Service Routes
        - id: chat-service
          uri: ${CHAT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/{tenant}/api/chat/**,/{tenant}/ws/**
          filters:
            - RewritePath=/(?<tenant>[^/]+)/(?<segment>ws/.*), /${segment}
            - RewritePath=/(?<tenant>[^/]+)/api/(?<segment>.*), /${segment}

        # Announcement Service Routes
        - id: announcement-service
          uri: ${ANNOUNCEMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/{tenant}/api/announcements/**
          filters:
            - RewritePath=/(?<tenant>[^/]+)/api/(?<segment>.*), /${segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG

supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  jwt:
    secret: ${SUPABASE_JWT_SECRET}
    issuer: ${SUPABASE_JWT_ISSUER}
    jwk-set-uri: ${SUPABASE_JWT_JWK_SET_URI}

tenant:
  cache:
    ttl: 5m
    max-size: 10000
